name: Backend Build Verification (Render)

on:
  push:
    branches: [ main ]
    paths:
      - 'Backend/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build Check
        run: |
          dotnet restore Backend/Backend.csproj
          dotnet build Backend/Backend.csproj -c Release --no-restore

      - name: Dockerfile Lint/Verification
       
        run: |
          docker build -t backend-test ./Backend -f Backend/Dockerfile --build-arg TARGETARCH=amd64